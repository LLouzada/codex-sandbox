#

name: codex-sandbox
services:
  codex-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-agent
    working_dir: /workspace
    volumes:
      - ${CODEX_HOST_WORKSPACE:-../../}:/workspace:rw
      - ${CODEX_HOST_HOME:-./codex-home}:/home/codex/.codex:rw
    read_only: false
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stdin_open: true
    tty: true

  codex-agent-offline:
    extends:
      service: codex-agent
    profiles: ["offline"]
    network_mode: "none"
